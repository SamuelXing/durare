name: ci

# Build, lint, and test the SDK on every push to main and every PR. The test job
# runs the whole suite against all three backends in one pass — in-memory, SQLite,
# and a **live Postgres** service — so the Postgres-gated tests actually run here
# (they early-return as "skipped" only when DATABASE_URL is unset, which it never
# is in this job).

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (a new push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (in-memory + sqlite + postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: durust_test
        ports:
          - 5432:5432
        # Wait until the server accepts connections before the steps run.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Drives the Postgres backend tests (schema is applied by the providers'
      # sqlx migrations on connect). Without this they skip; here they run.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/durust_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: test
        run: cargo test --all-targets
      - name: doc tests
        run: cargo test --doc

  docs:
    name: doc build
    runs-on: ubuntu-latest
    env:
      # docs.rs readiness: a broken intra-doc link or bad doc comment fails CI.
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --no-deps --all-features
